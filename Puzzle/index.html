<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Puzzle</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <h1 id="gameTitle">Pixel Puzzle</h1>
      </header>

      <section class="controls">
        <label class="btn" for="uploadInput">Upload image</label>
        <input id="uploadInput" type="file" accept="image/*" />
        <button id="randomImageButton" class="btn">Random image</button>
        <button id="cameraButton" class="btn">Camera</button>
        <button id="captureButton" class="btn" disabled>Capture</button>

        <label class="control-field">
          <span>Difficulty</span>
          <select id="difficultySelect">
            <option value="3">3x3</option>
            <option value="5" selected>5x5</option>
            <option value="10">10x10</option>
          </select>
        </label>

        <label class="control-field">
          <span>Shape</span>
          <select id="shapeSelect">
            <option value="square" selected>Square</option>
            <option value="triangle">Triangle</option>
            <option value="polygon">Random polygon</option>
          </select>
        </label>

        <label class="control-field">
          <span>Music</span>
          <select id="musicSelect">
            <option value="none" selected>Off</option>
            <option value="calm">Calm</option>
            <option value="pixel">Pixel</option>
          </select>
        </label>

        <button id="ghostButton" class="btn" disabled>Show</button>
        <button id="cutButton" class="btn" disabled>Cut into puzzles</button>
      </section>

      <section id="cameraPanel" class="camera-panel panel hidden">
        <h2>Camera view</h2>
        <video id="cameraVideo" autoplay playsinline></video>
      </section>

      <main class="main-layout">
        <section class="play-areas">
          <section class="assembly-section panel">
            <h2>Assembly field</h2>
            <div id="assemblyGrid" class="assembly-grid">
              <img id="ghostImage" class="ghost-image" alt="Original hint" />
              <canvas id="fxCanvas" width="500" height="500"></canvas>
            </div>
          </section>

          <section class="original-section panel">
            <h2>Original image</h2>
            <canvas id="originalCanvas" width="500" height="500"></canvas>
            <div class="record-box">
              <p>Current record: <strong id="currentRecord">—</strong></p>
              <p>Last time: <strong id="lastTime">—</strong></p>
            </div>
          </section>
        </section>

        <section class="storage-section panel">
          <h2>Storage</h2>
          <div id="storagePieces" class="storage-pieces drop-zone"></div>
          <div class="records">
            <h3>Leaderboard</h3>
            <ol id="leaderboard"></ol>
            <button id="downloadRecords" class="btn">Download records JSON</button>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
