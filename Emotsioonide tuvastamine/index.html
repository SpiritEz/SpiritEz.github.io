<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emotsioonide tuvastamine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="emotion-neutral">
    <main class="app">
      <h1>Emotsioonide tuvastamine</h1>
      <p class="description">
        Vaata kaamerasse. Rakendus proovib näo järgi tuvastada emotsiooni ja muudab tausta.
      </p>

      <section class="camera-card">
        <video id="video" autoplay muted playsinline></video>
        <div id="faceEmotionTag" class="face-emotion-tag hidden" aria-hidden="true">
          <img id="faceEmotionIcon" src="assets/emotions/neutral.svg" alt="Neutraalne" />
        </div>
        <div class="overlay">
          <p id="status">Käivitan kaamerat...</p>
          <p id="emotionLabel">Emotsioon: —</p>
        </div>
      </section>

      <section class="controls-card" aria-label="Valikud">
        <h2>Valikud</h2>
        <label><input type="checkbox" id="optBackground" checked /> Muuda tausta emotsiooni järgi</label>
        <label><input type="checkbox" id="optConfidence" checked /> Näita kindlust protsendina</label>
        <label><input type="checkbox" id="optMirror" /> Peegelda kaamerapilti</label>
        <label><input type="checkbox" id="optSound" /> Helisignaal emotsiooni muutusel</label>
        <label><input type="checkbox" id="optFigmaEmotion" checked /> Figma-stiilis emotsioon näo kõrval</label>
      </section>
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script defer src="script.js"></script>
  </body>
</html>
